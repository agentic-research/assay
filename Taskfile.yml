version: "3"

env:
  # Insulate every target from an ambient parent go.work (a monorepo workspace or a
  # linked worktree), so `task ci` behaves identically locally, in a linked worktree,
  # and in CI. A normal clone / CI checkout has no go.work, so this is a no-op there —
  # but it's what lets the pre-push hook run `task ci` from any checkout.
  GOWORK: "off"

tasks:
  build:
    desc: Build assay binary
    cmds:
      - go build -o bin/assay .

  test:
    desc: Run all tests
    cmds:
      - go test -race -v ./...

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format code
    cmds:
      - gofumpt -w -extra .

  fmt:check:
    desc: Check formatting (non-mutating) — fails if any file needs gofumpt
    cmds:
      - |
        out=$(gofumpt -l -extra .)
        if [ -n "$out" ]; then echo "needs formatting (run: task fmt):"; echo "$out"; exit 1; fi

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  check:
    desc: Dev gate (MUTATING — formats + regenerates the snapshot). Local convenience; CI uses `ci`.
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: test
      - task: map # regenerate the snapshot so a graph change rides along in the same commit (no post-merge 2-step)

  ci:
    desc: Merge gate (NON-mutating; 1:1 with the assay-map workflow + the pre-push hook). Never rewrites the tree.
    cmds:
      - task: fmt:check
      - task: vet
      - task: lint
      - task: test
      - task: map:check # fails if the committed dependency-graph snapshot drifted

  tidy:
    desc: Tidy module
    cmds:
      - go mod tidy

  hooks:install:
    desc: Install repo git hooks (sets core.hooksPath=.githooks); pre-push runs `task ci`
    cmds:
      - git config core.hooksPath .githooks
      - 'echo "installed: core.hooksPath=.githooks — pre-push now runs ''task ci''"'

  map:
    desc: Regenerate the dependency-graph snapshot (assay map over this repo → docs/dependency-graph.md)
    env:
      # Insulate from any ambient go.work so the build is identical locally and in
      # CI. CI checks out this repo alone (no workspace), so GOWORK=off is a no-op
      # there; locally it ignores a parent monorepo go.work.
      GOWORK: "off"
    vars:
      # md is the committed snapshot format: a self-contained markdown doc that
      # renders the mermaid graph on GitHub and lists every external seam with its
      # file:line. Override for a one-off view, e.g. `task map FORMAT=mermaid`.
      FORMAT: '{{.FORMAT | default "md"}}'
    cmds:
      - go build -o bin/assay .
      - mkdir -p docs
      # --group artifact: a single repo collapses to one repo-level node (an empty
      # graph), so the per-PR self-snapshot uses the per-artifact view to stay
      # non-empty. Cross-repo ecosystem maps use the repo group (see map:ecosystem).
      - ./bin/assay map . --format {{.FORMAT}} --group artifact > docs/dependency-graph.md

  map:check:
    desc: Drift-check the dependency-graph snapshot — fails if the map changed
    env:
      GOWORK: "off"
    cmds:
      # Regenerate the canonical md snapshot, then fail if git sees any change.
      # A new import / Dockerfile / CI-workflow seam shows up here as a diff, so an
      # undeclared dependency edge fails CI until the snapshot is regenerated and
      # committed. This is the load-bearing gate the assay-map workflow runs.
      # Future: multi-root (cross-repo) scans take several checkouts; out of scope
      # for this single-repo dogfood.
      - go build -o bin/assay .
      - mkdir -p docs
      - ./bin/assay map . --format md --group artifact > docs/dependency-graph.md
      - git diff --exit-code -- docs/dependency-graph.md

  map:ecosystem:
    desc: Regenerate the cross-repo ecosystem graph (assay map over every public root → docs/ecosystem-graph.md)
    env:
      GOWORK: "off"
    vars:
      # Base dir holding sibling checkouts, one per repo named in
      # docs/ecosystem-roots.txt. The nightly workflow points this at its
      # anonymous-clone workspace; locally it defaults to ~/remotes/art.
      BASE_DIR: '{{.ASSAY_ECOSYSTEM_DIR | default (printf "%s/remotes/art" .HOME)}}'
    cmds:
      - go build -o bin/assay .
      - mkdir -p docs
      # Resolve each public root to BASE_DIR/<repo>; skip (with a warning) any not
      # present locally so a partial checkout still produces a graph of what's there.
      # Repo grouping draws the cross-repo (root→root) edges — the ecosystem view.
      - |
        roots=""
        while IFS= read -r repo; do
          case "$repo" in ''|'#'*) continue ;; esac
          path="{{.BASE_DIR}}/$repo"
          if [ -d "$path" ]; then
            roots="$roots $path"
          else
            echo "warning: skipping $repo — not found at $path" >&2
          fi
        done < docs/ecosystem-roots.txt
        if [ -z "$roots" ]; then echo "no ecosystem roots found under {{.BASE_DIR}}" >&2; exit 1; fi
        ./bin/assay map $roots --format md --group repo > docs/ecosystem-graph.md
